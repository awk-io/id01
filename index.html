<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repo · name generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 640px;
      width: 100%;
      background: #141414;
      padding: 40px 32px;
      border-radius: 24px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .sub {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
      border-bottom: 1px solid #222;
      padding-bottom: 16px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .input-group input {
      flex: 1;
      padding: 12px 16px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
      min-width: 160px;
    }

    .input-group input:focus {
      border-color: #666;
    }

    .input-group input::placeholder {
      color: #555;
    }

    .btn {
      padding: 12px 24px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 12px;
      color: #eee;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:hover {
      background: #333;
      border-color: #666;
    }

    .btn-primary {
      background: #c0c0c0;
      color: #0a0a0a;
      border-color: #c0c0c0;
    }

    .btn-primary:hover {
      background: #e0e0e0;
      border-color: #e0e0e0;
    }

    .btn-secondary {
      background: transparent;
      border-color: #333;
    }

    .btn-secondary:hover {
      background: #1e1e1e;
    }

    .mode-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .mode-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-chip.active {
      background: #2a2a2a;
      color: #eee;
      border-color: #555;
    }

    .mode-chip:hover {
      border-color: #555;
    }

    .results {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .name-card {
      background: #1a1a1a;
      padding: 12px 16px;
      border-radius: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 15px;
      letter-spacing: -0.2px;
      border: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.15s;
      cursor: pointer;
    }

    .name-card:hover {
      background: #222;
      border-color: #444;
    }

    .name-card .copy {
      color: #555;
      font-size: 13px;
      font-family: system-ui, sans-serif;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .name-card:hover .copy {
      opacity: 1;
    }

    .name-card.copied {
      border-color: #888;
    }

    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #444;
      border-top: 1px solid #1a1a1a;
      padding-top: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer .count {
      color: #666;
    }

    .footer .btn {
      padding: 8px 16px;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #222;
      color: #ccc;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      border: 1px solid #333;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 500px) {
      .container {
        padding: 24px 16px;
      }
      .results {
        grid-template-columns: 1fr;
      }
      .input-group {
        flex-direction: column;
      }
      .btn {
        width: 100%;
        justify-content: center;
        text-align: center;
      }
      .footer {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>⬡ repo · name</h1>
  <div class="sub">minimal · short · tacky</div>

  <div class="input-group">
    <input type="text" id="keywordInput" placeholder="keyword (e.g. resume, editor, kit)" />
    <button class="btn btn-primary" id="generateBtn">generate</button>
  </div>

  <div class="mode-row" id="modeContainer">
    <span class="mode-chip active" data-mode="all">all</span>
    <span class="mode-chip" data-mode="short">short</span>
    <span class="mode-chip" data-mode="tacky">tacky</span>
    <span class="mode-chip" data-mode="action">action</span>
    <span class="mode-chip" data-mode="noun">noun</span>
  </div>

  <div class="results" id="resultsContainer"></div>

  <div class="footer">
    <span class="count" id="countDisplay">0 names</span>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-secondary" id="copyAllBtn">copy all</button>
      <button class="btn btn-secondary" id="refreshBtn">↻ refresh</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">copied</div>

<script>
  (function() {
    // ----- name pools --------------------------------------------------
    const pools = {
      short: [
        'cv', 'res', 'dev', 'kit', 'lab', 'box', 'bin', 'src', 'lib',
        'cfg', 'env', 'sys', 'ops', 'web', 'app', 'api', 'ui', 'ux',
        'io', 'me', 'pf', 'folio', 'site', 'page', 'space', 'corner',
        'play', 'craft', 'tiny', 'one', 'lite', 'min', 'pro', 'plus'
      ],
      tacky: [
        'gx', 'sklz', 'xray', 'fitz', 'hr0', 'j0b', 'xbin', 'fx',
        'zx', 'px', 'vx', 'dotz', 'runz', 'boxz', 'xtra', 'clik',
        'stax', 'flux', 'grim', 'zeph', 'kodo', 'nyx', 'x0', 'z9',
        'gr1d', 'n0de', 's1m', 'p0rt', 'k1x', '4x', 'x4', 'pwr'
      ],
      action: [
        'match', 'scan', 'fetch', 'push', 'wrap', 'mix', 'stitch',
        'weave', 'forge', 'boost', 'refine', 'polish', 'craft', 'hone',
        'lift', 'tune', 'level', 'run', 'edit', 'type', 'test', 'try',
        'view', 'track', 'master', 'learn', 'guide', 'study', 'curate'
      ],
      noun: [
        'bits', 'dots', 'spools', 'wires', 'cogs', 'gears', 'pipes',
        'racks', 'vaults', 'archive', 'warehouse', 'stash', 'junk',
        'sandbox', 'playground', 'scratch', 'misc', 'trash', 'heap',
        'pile', 'stack', 'store', 'clips', 'frags', 'chunks', 'blocks',
        'nuggets', 'crumbs', 'dust', 'sparks', 'echo', 'trace', 'marks',
        'tags', 'notebook', 'scribble', 'doodle', 'sketch', 'drafts',
        'backlog', 'random', 'extra', 'overflow', 'spill', 'clutter'
      ]
    };

    const allNames = [
      ...pools.short, ...pools.tacky, ...pools.action, ...pools.noun
    ];

    // remove duplicates
    const uniqueAll = [...new Set(allNames)];

    // ----- DOM refs ----------------------------------------------------
    const keywordInput = document.getElementById('keywordInput');
    const generateBtn = document.getElementById('generateBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const countDisplay = document.getElementById('countDisplay');
    const refreshBtn = document.getElementById('refreshBtn');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const modeContainer = document.getElementById('modeContainer');
    const toast = document.getElementById('toast');

    let currentMode = 'all';
    let currentNames = [];

    // ----- helpers ----------------------------------------------------
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getNamesForMode(mode) {
      if (mode === 'all') return [...uniqueAll];
      return pools[mode] ? [...pools[mode]] : [];
    }

    function filterByKeyword(names, keyword) {
      if (!keyword.trim()) return names;
      const kw = keyword.trim().toLowerCase();
      return names.filter(name => name.toLowerCase().includes(kw));
    }

    function generateNames(mode, keyword) {
      let base = getNamesForMode(mode);
      let filtered = filterByKeyword(base, keyword);
      // if filtered is empty, fallback to all names with keyword
      if (filtered.length === 0 && keyword.trim()) {
        filtered = filterByKeyword(uniqueAll, keyword);
      }
      // if still empty, return all names
      if (filtered.length === 0) filtered = [...uniqueAll];
      // shuffle and take up to 24
      const shuffled = shuffleArray(filtered);
      return shuffled.slice(0, 24);
    }

    function render(names) {
      resultsContainer.innerHTML = '';
      if (names.length === 0) {
        resultsContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#555; padding:24px 0;">no names found</div>';
        countDisplay.textContent = '0 names';
        return;
      }

      names.forEach(name => {
        const card = document.createElement('div');
        card.className = 'name-card';
        card.innerHTML = `<span>${name}</span><span class="copy">copy</span>`;
        card.addEventListener('click', () => {
          navigator.clipboard.writeText(name).then(() => {
            card.classList.add('copied');
            showToast(`copied "${name}"`);
            setTimeout(() => card.classList.remove('copied'), 800);
          }).catch(() => {
            // fallback
            const textarea = document.createElement('textarea');
            textarea.value = name;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            card.classList.add('copied');
            showToast(`copied "${name}"`);
            setTimeout(() => card.classList.remove('copied'), 800);
          });
        });
        resultsContainer.appendChild(card);
      });

      countDisplay.textContent = `${names.length} names`;
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    // ----- main generate ---------------------------------------------
    function generate() {
      const keyword = keywordInput.value;
      const names = generateNames(currentMode, keyword);
      currentNames = names;
      render(names);
    }

    // ----- copy all ---------------------------------------------------
    function copyAll() {
      if (currentNames.length === 0) return;
      const text = currentNames.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        showToast(`copied ${currentNames.length} names`);
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast(`copied ${currentNames.length} names`);
      });
    }

    // ----- mode switching ---------------------------------------------
    modeContainer.addEventListener('click', (e) => {
      const chip = e.target.closest('.mode-chip');
      if (!chip) return;
      const mode = chip.dataset.mode;
      if (!mode) return;
      document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentMode = mode;
      generate();
    });

    // ----- event bindings ---------------------------------------------
    generateBtn.addEventListener('click', generate);
    refreshBtn.addEventListener('click', generate);
    copyAllBtn.addEventListener('click', copyAll);

    keywordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate();
    });

    // ----- init -------------------------------------------------------
    generate();

  })();
</script>
</body>
</html>
